{% extends "layout.html" %}
{% block content %}
<section class="card">
  <h1>Server Config</h1>
  {% if message.is_some() %}
  <p>{{ message.as_ref().unwrap() }}</p>
  {% endif %}
  {% if error_message.is_some() %}
  <p class="error">{{ error_message.as_ref().unwrap() }}</p>
  {% endif %}
  <form method="post" action="/settings/server-config">
    <label for="id_server">ID server</label>
    <input id="id_server" name="id_server" value="{{ id_server }}" required>

    <label for="relay_server">Relay server</label>
    <input id="relay_server" name="relay_server" value="{{ relay_server }}" required>

    <label for="api_server">API server</label>
    <input id="api_server" name="api_server" value="{{ api_server }}">

    <label for="public_key">Public key</label>
    <textarea id="public_key" name="public_key" rows="4">{{ public_key }}</textarea>

    <button type="submit">Save</button>
  </form>
</section>
{% endblock %}
