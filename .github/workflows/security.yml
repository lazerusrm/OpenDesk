name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  privacy-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Privacy scan
        run: bash scripts/privacy-scan.sh

      - name: Public content scan
        run: bash scripts/public-content-scan.sh
